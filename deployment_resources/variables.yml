variables:
  my_warehouse_id:
    description: The ID of a SQL warehouse for your dashboard and pipeline
    lookup:
      warehouse: "Serverless Starter Warehouse"
  catalog_name:
    description: The catalog containing your adoption dashboard tables
    default: users
  schema_name:
    description: The schema containing your adoption dashboard tables
    default: <your_schema>
  skip_get_conversations:
    description: Skip pulling all conversation content via API
    default: false
  